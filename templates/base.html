<!-- base.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sanatçı Portfolyo{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='bunga.css') }}">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('index') }}">Fatih Bakır • Oyma Sanatı</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Menüyü aç/kapat">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Ana Sayfa</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('galeri') }}">Koleksiyon</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">Hakkında</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('contact') }}">İletişim</a></li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-gold btn-sm" href="{{ url_for('galeri') }}">Eserleri Gör</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <footer class="text-white text-center py-4">
    <div class="container">
      <div class="small opacity-75">
        &copy; 2026 Fatih Bakır. Tüm hakları saklıdır.
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    (() => {
      const els = document.querySelectorAll('.reveal');
      if (!('IntersectionObserver' in window)) {
        els.forEach(el => el.classList.add('show'));
        return;
      }
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) e.target.classList.add('show');
        });
      }, { threshold: 0.12 });

      els.forEach(el => io.observe(el));
    })();
  </script>
</body>
</html>
