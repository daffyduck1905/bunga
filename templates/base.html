<!-- base.html -->

<body>

</li>

<li class="nav-item">

</li>

{{ artist.email }}
</div>

</div>

</div>

<!-- REFERANS ZOOM MODAL -->

<div class="modal fade" id="zoomModal" tabindex="-1">

<div class="modal-dialog modal-dialog-centered modal-xl">

<div class="modal-content bg-dark border-0">

<div class="modal-body text-center p-2">

<img id="zoomImage" src="" style="max-width:100%; height:auto;">

</div>

</div>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

(function () {

const els = document.querySelectorAll('.scroll-reveal, .reveal');

if (!('IntersectionObserver' in window)) {

els.forEach(el => el.classList.add('scroll-visible'));

return;

}

const io = new IntersectionObserver((entries) => {

entries.forEach(e => {

if (e.isIntersecting) e.target.classList.add('scroll-visible');

});

}, { threshold: 0.12 });

els.forEach(el => io.observe(el));

})();

</script>


<script>

/* REFERANS FOTO ZOOM */

document.addEventListener("DOMContentLoaded", function(){

const modal = new bootstrap.Modal(document.getElementById('zoomModal'));

document.querySelectorAll('.referans-zoom').forEach(img => {

img.addEventListener('click', function(){

document.getElementById('zoomImage').src = this.src;

modal.show();

});

});

});

</script>


<script>

const protectedWords = [
"Fatih Bakır",
"Instagram",
"WhatsApp"
];

async function translatePage(){

const elements = document.querySelectorAll(
"h1,h2,h3,h4,h5,p,a,span,button,li"
);

for(const el of elements){

let text = el.innerText;

if(!text || text.length < 2) continue;

let skip = false;

protectedWords.forEach(w=>{
if(text.includes(w)) skip = true;
});

if(skip) continue;

try{

const res = await fetch("/translate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:text
})
});

const data = await res.json();

if(data.translated){

el.innerText = data.translated;

}

}catch(e){}

}

}

document.querySelectorAll(".lang-btn").forEach(btn=>{

btn.addEventListener("click",()=>{

const lang = btn.dataset.lang;

if(lang === "en"){

translatePage();

}

location.hash = lang;

});

});

</script>

{% block scripts %}{% endblock %}

</body>
</html>
