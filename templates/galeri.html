<!-- galeri.html -->

{% extends 'base.html' %}

{% block title %}Galeri{% endblock %}

{% block content %}

<div class="text-center mt-5 scroll-reveal">

<img src="{{ url_for('static', filename='logo.png') }}" style="height:120px">

</div>

<section class="container my-5">

<h1 class="text-center mb-4 scroll-reveal">Galeri</h1>

{% if images and images|length > 0 %}

<div class="row">

{% for img in images %}

<div class="col-md-4 col-sm-6 mb-4 scroll-reveal">

<div class="card hover-effect">

<img
src="{{ url_for('static', filename='gallery/eserler/' ~ img) }}"
class="card-img-top"
style="cursor:pointer"
data-bs-toggle="modal"
data-bs-target="#imgModal"
data-img="{{ url_for('static', filename='gallery/eserler/' ~ img) }}"
>

<div class="card-body text-center">

<a class="btn btn-outline-gold btn-sm"
href="{{ url_for('eser_detay', filename=img) }}">
Detay
</a>

</div>

</div>

</div>

{% endfor %}

</div>

{% else %}

<div class="alert alert-warning">

Galeriye henüz eser eklenmemiş.

</div>

{% endif %}

</section>

{% endblock %}
