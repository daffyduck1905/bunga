{% extends 'base.html' %}

{% block title %}Eser{% endblock %}

{% block content %}

<div class="container text-center my-5">

<img
src="{{ url_for('static', filename='gallery/eserler/' ~ filename) }}"
style="max-width:100%; height:auto;">

</div>


<div class="container mb-5">

<div class="thumb-wrapper">

<button class="thumb-arrow" onclick="scrollThumb(-1)">‹</button>

<div id="thumbStrip" class="thumb-strip">

{% for img in images %}

<a href="{{ url_for('eser_detay', filename=img) }}"
class="thumb-item {% if img == filename %}active-thumb{% endif %}">

<img src="{{ url_for('static', filename='gallery/eserler/' ~ img) }}">

</a>

{% endfor %}

</div>

<button class="thumb-arrow" onclick="scrollThumb(1)">›</button>

</div>

</div>

{% endblock %}


{% block scripts %}

<script>

const current = "{{ filename }}";

const images = [
{% for img in images %}
"{{ img }}",
{% endfor %}
];

let index = images.indexOf(current);

let locked = false;

function go(i){

if(locked) return;

locked = true;

if(i < 0) i = images.length - 1;
if(i >= images.length) i = 0;

window.location = "/eser/" + images[i];

}

document.addEventListener("keydown", function(e){

if(e.repeat) return;

if(e.key === "ArrowRight"){

go(index + 1);

}

if(e.key === "ArrowLeft"){

go(index - 1);

}

if(e.key === "Escape"){

if(!locked){

locked = true;

window.location = "/galeri";

}

}

});

function scrollThumb(dir){

const strip = document.getElementById("thumbStrip");

strip.scrollBy({

left: dir * 200,

behavior:"smooth"

});

}

</script>

{% endblock %}
