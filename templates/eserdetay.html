{% extends 'base.html' %}

{% block title %}

{% if request.args.get('lang') == 'en' %}
Artwork
{% else %}
Eser
{% endif %}

{% endblock %}

{% block content %}

<!-- VISUAL ARTWORK SCHEMA -->

<script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "VisualArtwork",
 "creator": {
   "@type": "Person",
   "name": "Fatih Bakır"
 },
 "artMedium": "Ahşap Oyma ve Altın Varak",
 "artform": "Wood Carving",
 "description": "Fatih Bakır tarafından yapılan ahşap oyma ve altın varak sanat eseri",
 "image": "https://fatihbakir.pythonanywhere.com/static/gallery/eserler/{{ filename }}"
}
</script>

<div class="container text-center my-5">

<div class="viewer-wrapper">

<button class="viewer-arrow left" onclick="prevImage()">❮</button>

<img
id="viewerImage"
src="{{ url_for('static', filename='gallery/eserler/' ~ filename) }}"
class="viewer-img"
loading="lazy"
decoding="async"
alt="Fatih Bakır ahşap oyma altın varak sanat eseri"
title="Fatih Bakır ahşap oyma altın varak sanat eseri">

<button class="viewer-arrow right" onclick="nextImage()">❯</button>

</div>

</div>


<!-- DUVARDA GÖR BUTONU -->

<div style="text-align:center;margin-top:20px;">

<button id="wallPreviewBtn"
style="
background:#D4AF37;
border:none;
padding:12px 28px;
color:#000;
font-family:'Playfair Display',serif;
font-size:18px;
cursor:pointer;
">

{% if request.args.get('lang') == 'en' %}
See on Wall
{% else %}
Duvarda Gör
{% endif %}

</button>

</div>



<div class="container mb-5">

<div class="thumb-wrapper">

<button class="thumb-arrow" onclick="scrollThumb(-1)">‹</button>

<div id="thumbStrip" class="thumb-strip">

{% for img in images %}

<div
class="thumb-item {% if img == filename %}active-thumb{% endif %}"
onclick="openImage('{{ img }}')">

<img
src="{{ url_for('static', filename='gallery/eserler/' ~ img) }}"
loading="lazy"
decoding="async"
alt="Fatih Bakır ahşap oyma altın varak sanat eseri"
title="Fatih Bakır ahşap oyma altın varak sanat eseri">

</div>

{% endfor %}

</div>

<button class="thumb-arrow" onclick="scrollThumb(1)">›</button>

</div>

</div>


<!-- DUVAR PREVIEW MODAL -->

<div id="wallModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
z-index:9999;
justify-content:center;
align-items:center;
">

<div style="position:relative;">

<img src="{{ url_for('static', filename='665.png') }}"
style="max-width:90vw;max-height:90vh;">

<img id="wallArt"
style="
position:absolute;
top:35%;
left:50%;
transform:translate(-50%,-50%);
max-width:320px;
cursor:move;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
">

<button id="closeWall"
style="
position:absolute;
top:-40px;
right:0;
background:#D4AF37;
border:none;
padding:8px 15px;
cursor:pointer;
font-weight:bold;
">

X

</button>

</div>

</div>

{% endblock %}

{% block scripts %}

<script>

const images = [
{% for img in images %}
"{{ img }}",
{% endfor %}
];

let index = images.indexOf("{{ filename }}");

const viewer = document.getElementById("viewerImage");


function updateViewer(){

viewer.src = "/static/gallery/eserler/" + images[index];

document.querySelectorAll(".thumb-item").forEach((el,i)=>{

el.classList.remove("active-thumb");

if(i === index){

el.classList.add("active-thumb");

}

});

}


function nextImage(){

index++;

if(index >= images.length){

index = 0;

}

updateViewer();

}


function prevImage(){

index--;

if(index < 0){

index = images.length - 1;

}

updateViewer();

}


function openImage(name){

index = images.indexOf(name);

updateViewer();

}


document.addEventListener("keydown", function(e){

if(e.key === "ArrowRight") nextImage();

if(e.key === "ArrowLeft") prevImage();

if(e.key === "Escape"){

{% if request.args.get('lang') == 'en' %}

window.location = "/galeri?lang=en";

{% else %}

window.location = "/galeri?lang=tr";

{% endif %}

}

});


function scrollThumb(dir){

document.getElementById("thumbStrip").scrollBy({

left: dir * 200,

behavior:"smooth"

});

}



/* WALL PREVIEW */

const wallBtn = document.getElementById("wallPreviewBtn");
const wallModal = document.getElementById("wallModal");
const wallArt = document.getElementById("wallArt");
const closeWall = document.getElementById("closeWall");

wallBtn.addEventListener("click", () => {

wallArt.src = viewer.src;

wallModal.style.display = "flex";

});

closeWall.addEventListener("click", () => {

wallModal.style.display = "none";

});



/* DRAG SYSTEM */

let isDragging = false;
let offsetX, offsetY;

wallArt.addEventListener("mousedown", (e) => {

isDragging = true;

offsetX = e.clientX - wallArt.offsetLeft;
offsetY = e.clientY - wallArt.offsetTop;

});

document.addEventListener("mousemove", (e) => {

if (!isDragging) return;

wallArt.style.left = (e.clientX - offsetX) + "px";
wallArt.style.top = (e.clientY - offsetY) + "px";

});

document.addEventListener("mouseup", () => {

isDragging = false;

});

</script>

{% endblock %}
