{% extends 'base.html' %}
{% block title %}Eser | Fatih Bakır{% endblock %}

{% block content %}

<section class="container my-5">

  <div class="page-logo scroll-reveal">
    <img class="page-logo-img" src="{{ url_for('static', filename='brand/logo.png') }}?v={{ asset_version }}" alt="Logo">
  </div>

  <div class="section-title scroll-reveal">
    <h2>Eser Detayı</h2>
    <div class="accent-line"></div>
  </div>

  <div class="card p-3 scroll-reveal">
    <img src="{{ url_for('static', filename=image_path) }}?v={{ asset_version }}"
         class="w-100"
         style="border-radius:16px; border:1px solid rgba(212,175,55,.16);"
         alt="{{ filename }}">
  </div>

  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-4 scroll-reveal">
    {% if prev_filename %}
      <a class="btn btn-outline-gold" href="{{ url_for('eser_detay', filename=prev_filename) }}">← Önceki</a>
    {% else %}
      <span></span>
    {% endif %}

    <a class="btn btn-gold" href="{{ url_for('galeri') }}">Galeriye Dön</a>

    {% if next_filename %}
      <a class="btn btn-outline-gold" href="{{ url_for('eser_detay', filename=next_filename) }}">Sonraki →</a>
    {% else %}
      <span></span>
    {% endif %}
  </div>

</section>

{% endblock %}
