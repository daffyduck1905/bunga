{% extends 'base.html' %}
{% block title %}Admin Giriş{% endblock %}

{% block content %}
<section class="container my-5" style="max-width:420px;">
  <div class="card p-4">
    <h3 class="mb-3 text-center">🔒 Admin Giriş</h3>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Şifre</label>
        <input type="password" name="password" class="form-control" required>
      </div>

      <button class="btn btn-dark w-100">Giriş Yap</button>
    </form>
  </div>
</section>
{% endblock %}
