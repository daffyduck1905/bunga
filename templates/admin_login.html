<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Giriş</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0b0b0d;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-family:Arial;
}

.login-box{
background:#141417;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,.6);
}

.user-icon{
font-size:50px;
margin-bottom:20px;
}

input{
background:#1e1e22 !important;
border:none !important;
color:white !important;
}

button{
background:#D4AF37;
border:none;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<div class="login-box">

<div class="user-icon">
👤
</div>

<h4 class="mb-4">Admin Panel</h4>

<form method="POST">

<input type="password" name="password" placeholder="Şifre" class="form-control mb-3">

<button class="btn w-100">Giriş</button>

</form>

</div>

</body>
</html>
