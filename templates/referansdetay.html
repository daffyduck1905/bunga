{% extends 'base.html' %}

{% block title %}Referans{% endblock %}

{% block content %}

<div class="container text-center my-5 scroll-reveal">

<img
id="viewerImage"
src="{{ url_for('static', filename='referanslar/' ~ filename) }}"
style="max-width:100%; height:auto;">

</div>

{% endblock %}

{% block scripts %}

<script>

const current = "{{ filename }}";

const images = [
"120.jpeg",
"121.jpeg",
"125.jpeg",
"135.jpeg"
];

let index = images.indexOf(current);

function go(i){

if(i < 0) i = images.length - 1;
if(i >= images.length) i = 0;

window.location = "/referans/" + images[i];

}

document.addEventListener("keydown", function(e){

if(e.key === "ArrowRight"){

go(index + 1);

}

if(e.key === "ArrowLeft"){

go(index - 1);

}

if(e.key === "Escape"){

window.location = "/referanslar";

}

});

</script>

{% endblock %}
