.news-divider{

margin-bottom:40px;
}

.news-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:60px 120px;
align-items:center;
}

.news-item{
display:flex;
align-items:center;
justify-content:center;
}

.news-item img{
max-width:200px;
max-height:200px;
cursor:pointer;
transition:0.3s;
}

.news-item img:hover{

@media(max-width:768px){
.news-grid{
