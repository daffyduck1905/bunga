<!-- contact.html -->

{% extends 'base.html' %}

{% block title %}İletişim{% endblock %}

{% block content %}

<div class="text-center mt-5 scroll-reveal">

<img src="{{ url_for('static', filename='logo.png') }}" style="height:120px">

</div>

<section class="container my-5">

<h1 class="text-center mb-4 scroll-reveal">İletişim</h1>

<div class="card p-4 scroll-reveal">

<p>
Eserler, özel siparişler veya sergiler hakkında bilgi almak için
aşağıdaki iletişim kanallarından ulaşabilirsiniz.
</p>

<p>
<strong>E-posta:</strong>
{{ artist.email }}
</p>

<p>
<strong>Instagram:</strong>
<a href="https://instagram.com/{{ artist.instagram }}" target="_blank">
@{{ artist.instagram }}
</a>
</p>

</div>

</section>

{% endblock %}
