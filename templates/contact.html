<!-- contact.html -->

{% extends 'base.html' %}

{% block title %}İletişim{% endblock %}

{% block content %}
    <section class="container my-5">
        <h1 class="text-center mb-5" style="font-family: 'Playfair Display', serif; color: #c0392b;">İletişim</h1>
        
        <div class="row">
            <div class="col-md-6">
                <h3>İletişim Bilgileri</h3>
                <p><strong>E-posta:</strong> info@ibrahimbalaban.com</p>
                <p><strong>Telefon:</strong> +90 555 123 45 67</p>
                <p><strong>Adres:</strong> Bursa / İstanbul</p>
            </div>
            
            <div class="col-md-6">
                <h3>Mesaj Gönder</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Adınız</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">E-posta</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Mesajınız</label>
                        <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-danger">Gönder</button>
                </form>
            </div>
        </div>
    </section>
{% endblock %}
