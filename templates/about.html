{% extends 'base.html' %}

{% block title %}Biyografi | Fatih Bakır{% endblock %}

{% block content %}
<style>
    /* Sayfa Genel Yapısı */
    .bio-section {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 80px 0;
        overflow: hidden;
    }

    /* Arka Plan Fotoğrafı - Senin gönderdiğin görsel */
    .bio-background {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url('{{ artist.profile_photo }}');
        background-size: cover;
        background-position: center;
        filter: blur(12px) brightness(0.35); /* BLUR ve KARARTMA */
        transform: scale(1.1);
        z-index: -1;
    }

    /* Şeffaf Metin Kartı (Glassmorphism) */
    .bio-card {
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(212, 175, 55, 0.3); /* Hafif altın rengi çerçeve */
        border-radius: 20px;
        padding: 60px;
        color: #ffffff;
        box-shadow: 0 25px 50px rgba(0,0,0,0.7);
    }

    .bio-header {
        font-family: 'Playfair Display', serif;
        color: #D4AF37; /* Altın rengi başlık */
        letter-spacing: 3px;
    }

    .bio-body-text {
        font-size: 1.2rem;
        line-height: 2.1;
        text-align: justify;
        white-space: pre-line; /* Python'daki satır başlarını korur */
        color: #f0f0f0;
    }

    .achievement-list {
        border-left: 4px solid #D4AF37;
        padding-left: 20px;
        background: rgba(255, 255, 255, 0.05);
        padding-top: 15px;
        padding-bottom: 15px;
        border-radius: 0 10px 10px 0;
    }
</style>

<div class="bio-section">
    <div class="bio-background"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="bio-card">
                    <div class="text-center mb-5">
                        <h1 class="display-3 bio-header">{{ artist.name }}</h1>
                        <p class="h4 italic text-light opacity-75">{{ artist.title }}</p>
                        <hr style="width: 100px; margin: 20px auto; border-top: 3px solid #D4AF37;">
                    </div>
                    
                    <div class="bio-body-text">
                        {{ artist.bio_long }}
                    </div>

                    <div class="row mt-5">
                        <div class="col-md-12">
                            <h3 class="bio-header h4 mb-4">Uluslararası Projeler ve Başarılar</h3>
                            <div class="row">
                                {% for item in artist.exhibitions %}
                                <div class="col-md-6 mb-3">
                                    <div class="achievement-list">
                                        {{ item }}
                                    </div>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
